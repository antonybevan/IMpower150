study_id: "GO29436"
acronym: "IMpower150"
sponsor: "Hoffmann-La Roche"
indication: "Stage IV Non-Squamous Non-Small Cell Lung Cancer (NSCLC)"
protocol_version: "3.0"
standards_version:
  sdtmig: "3.4"
  adamig: "1.3"
  define_xml: "2.1"
  dataset_json: "1.1"

m11_protocol:
  objectives:
    - obj_id: "OBJ_PFS_WT"
      type: "primary"
      text: "Progression-Free Survival (PFS), as determined by the Investigator using RECIST 1.1 in Arm B versus Arm C in the Teff-high WT population and ITT-WT population."
      m11_section: "Section 3.1"
    - obj_id: "OBJ_OS_WT"
      type: "primary"
      text: "Overall Survival (OS) in Arm B versus Arm C in the ITT-WT population."
      m11_section: "Section 3.2"
    - obj_id: "OBJ_OS_ARMA"
      type: "primary"
      text: "Overall Survival (OS) in Arm A versus Arm C in the ITT-WT population."
      m11_section: "Section 3.3"
    - obj_id: "OBJ_ORR"
      type: "secondary"
      text: "Objective Response Rate (ORR), Complete Response (CR) or Partial Response (PR), as determined by the Investigator using RECIST v1.1 in the ITT-WT population."
      m11_section: "Section 3.4"
    - obj_id: "OBJ_DOR"
      type: "secondary"
      text: "Duration of Response (DOR), as determined by the Investigator using RECIST v1.1 in the ITT-WT population."
      m11_section: "Section 3.5"
    - obj_id: "OBJ_IPFS"
      type: "exploratory"
      text: "Progression-Free Survival (iPFS), as determined by the Investigator using iRECIST in Arm B versus Arm C in the ITT population."
      m11_section: "Section 3.6"

  estimands:
    - estimand_id: "EST_PFS_WT"
      name: "Investigator-Assessed PFS in ITT Wild-Type Population"
      target_population: "Chemotherapy-naïve participants with Stage IV non-squamous NSCLC, excluding patients with EGFR mutations or ALK translocations (Wild-Type population)."
      variable_of_interest: "Time from randomization to the first occurrence of objective disease progression as determined by the Investigator using RECIST 1.1 or death from any cause, whichever occurs first."
      ice_strategy: "Treatment Policy Strategy: Disease progression or death is counted as an event regardless of intercurrent events (such as subsequent non-protocol cancer therapies or dose modifications)."
      summary_measure: "Hazard Ratio estimated from a stratified Cox proportional hazards model, and median PFS using Kaplan-Meier methodology."
    
    - estimand_id: "EST_OS_WT"
      name: "Overall Survival in ITT Wild-Type Population"
      target_population: "Chemotherapy-naïve participants with Stage IV non-squamous NSCLC, excluding patients with EGFR mutations or ALK translocations."
      variable_of_interest: "Time from randomization to death from any cause."
      ice_strategy: "Treatment Policy Strategy: Death is counted as an event regardless of any post-progression therapies initiated (e.g. crossover)."
      summary_measure: "Hazard Ratio estimated from a stratified log-rank test and Kaplan-Meier product-limit estimates."

    - estimand_id: "EST_IPFS_ITT"
      name: "Investigator-Assessed iPFS in ITT Population"
      target_population: "All randomized chemotherapy-naïve participants with Stage IV non-squamous NSCLC (ITT population, including EGFR/ALK mutant patients)."
      variable_of_interest: "Time from randomization to the first occurrence of confirmed disease progression as determined by the Investigator using iRECIST or death from any cause, whichever occurs first."
      ice_strategy: "Treatment Policy Strategy: Confirmed progression or death counted as event."
      summary_measure: "Hazard Ratio from unstratified Cox model."

  schedule_of_activities:
    visits:
      - name: "Screening"
        window: "Days -28 to -1"
      - name: "Cycle 1 Day 1"
        window: "Day 1 (Baseline)"
      - name: "Cycle 2 Day 1"
        window: "Day 21 (±3 days)"
      - name: "Cycle 3 Day 1"
        window: "Day 42 (±3 days)"
      - name: "Cycle 4 Day 1"
        window: "Day 63 (±3 days)"
    assessments:
      - type: "Tumor Scan (CT/MRI)"
        frequency: "Every 6 weeks (42 days ±7 days) from Cycle 1 Day 1 for first 48 weeks, then every 9 weeks thereafter."
      - type: "Survival Follow-Up"
        frequency: "Every 3 months after treatment discontinuation until death, loss to follow-up, or study termination."
